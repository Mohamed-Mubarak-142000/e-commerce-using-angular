<div class="actions">
  <!-- Show quantity controls only when quantity > 0 -->
  @if (quantity > 0) {
    <button (click)="onDecrease()">-</button>
    <span>{{ quantity }}</span>
    <button (click)="onIncrease()">+</button>
  }

  <!-- Show "Add to cart" only when quantity === 0 -->
  @if (quantity === 0) {
    <button class="add-to-cart-btn" (click)="$event.stopPropagation(); onAddToCart()">
      Add to cart
    </button>
  }
</div>
