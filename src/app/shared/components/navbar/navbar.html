<nav
  class="fixed top-0 left-0 w-full z-50 transition-all duration-300"
  [class.bg-white]="isScrolled()"
  [class.shadow-md]="isScrolled()"
  [class.backdrop-blur]="!isScrolled()"
>
  <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
    <!-- Logo -->
    <a routerLink="/" class="text-xl font-bold flex items-center gap-2">
      <mat-icon class="text-blue-600">storefront</mat-icon>
      ShopEase
    </a>

    <!-- Desktop Links -->
    <div class="hidden md:flex items-center gap-6 text-gray-700">
      <a
        routerLink="/"
        routerLinkActive="text-blue-600 border-b-2 border-blue-600"
        [routerLinkActiveOptions]="{ exact: true }"
        class="hover:text-black pb-1"
      >
        Home
      </a>

      <a
        routerLink="/products"
        routerLinkActive="text-blue-600 border-b-2 border-blue-600"
        class="hover:text-black pb-1"
      >
        Products
      </a>

      <a
        routerLink="/wishlist"
        routerLinkActive="text-blue-600 border-b-2 border-blue-600"
        class="hover:text-black pb-1"
      >
        Wishlist
      </a>

      <a
        routerLink="/cart"
        routerLinkActive="text-blue-600 border-b-2 border-blue-600"
        class="hover:text-black pb-1"
      >
        Cart
      </a>
    </div>

    <!-- Right Side -->
    <div class="flex items-center gap-4">
      <!-- Wishlist -->
      <button class="relative" (click)="navigateToWishlist()" title="Go to Wishlist">
        <mat-icon>favorite</mat-icon>
        <span class="absolute -top-2 -right-2 text-xs bg-red-500 text-white rounded-full px-1">
          {{ getWishlistCount() }}
        </span>
      </button>

      <!-- Cart -->
      <button class="relative" (click)="navigateToCart()" title="Go to Cart">
        <mat-icon>shopping_cart</mat-icon>
        <span class="absolute -top-2 -right-2 text-xs bg-blue-500 text-white rounded-full px-1">
          {{ getCartCount() }}
        </span>
      </button>

      @if (isLoggedIn()) {
        <button
          (click)="navigateToProfile()"
          class="bg-green-600 text-white px-4 py-1 rounded-full"
        >
          {{ user()?.username }}
        </button>

        <button (click)="logout()" class="ml-2 bg-red-400 px-4 py-1 rounded-xl text-white">
          Logout
        </button>
      } @else {
        <button (click)="navigateToLogin()" class="bg-blue-600 text-white px-4 py-1 rounded-full">
          Login
        </button>
      }

      <!-- Mobile Menu Button -->
      <button class="md:hidden" (click)="toggleMenu()">
        <mat-icon>menu</mat-icon>
      </button>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div
    class="md:hidden bg-white overflow-hidden transition-all duration-300"
    [style.maxHeight]="isMenuOpen() ? '300px' : '0px'"
  >
    <div class="flex flex-col px-7 py-4 gap-3">
      <a routerLink="/" (click)="toggleMenu()">Home</a>
      <a routerLink="/products" (click)="toggleMenu()">Products</a>
      <a routerLink="/wishlist" (click)="toggleMenu()">Wishlist</a>
      <a routerLink="/cart" (click)="toggleMenu()">Cart</a>
    </div>
  </div>
</nav>
